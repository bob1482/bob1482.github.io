<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Tools</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #5b5b5b;
      font-family: Arial, sans-serif;
      gap: 2rem;
    }
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 220px;
      height: 100px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #cccccc;
      background: #4b4b4b;
      border: 2px solid #252525;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover {
      background: #696969;
      transform: scale(1.05);
    }
    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <a class="btn" href="./keyboard/">Keyboard</a>
  <a class="btn" href="./touchscreen/">Touchscreen</a>
</body>
</html>
