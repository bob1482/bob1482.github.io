<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fullscreen Tap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      text-align: center;
      padding: 20px;
      color: #fff;
    }

    .container h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .container p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">👆</span>
    <h1>Tap Anywhere</h1>
    <p>Tap the screen to enter fullscreen</p>
  </div>

  <script>
    (function() {
      const doc = document.documentElement;

      function goFullscreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          const el = document.documentElement;
          if (el.requestFullscreen) {
            el.requestFullscreen().catch(function(err) {
              // Ignore errors (e.g. user gesture not triggered)
            });
          } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
          }
        }
      }

      function exitFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          if (document.exitFullscreen) {
            document.exitFullscreen().catch(function() {});
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          }
        }
      }

      document.addEventListener('click', function(e) {
        goFullscreen();
      });

      document.addEventListener('touchstart', function(e) {
        goFullscreen();
      }, { passive: true });

      // Listen for fullscreen change events to stay in fullscreen
      function onFSChange() {
        // If user exits fullscreen, re-enter on next tap (handled by listeners above)
      }

      document.addEventListener('fullscreenchange', onFSChange);
      document.addEventListener('webkitfullscreenchange', onFSChange);
    })();
  </script>
</body>
</html>
